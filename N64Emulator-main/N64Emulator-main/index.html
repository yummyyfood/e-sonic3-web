<!DOCTYPE html>
<html>

<head>
    <title>N64 Emulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="icons/favicon.png">
    <!-- Fixed missing closing bracket on meta tag below -->
    <meta name="keywords" content="N64 Emulator, N64 JavaScript Emulator, WebAssembly, HTML5, Nintendo 64">
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rivets/0.9.6/rivets.bundled.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.2/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.0/nipplejs.min.js"></script>
	
    <style>
        html,body{padding:0;margin:0}
        canvas{width:100%;height:100%;position:fixed;left:0;right:0;bottom:0;top:0;z-index:-1}
        input[type="file"] { display: none; }
        .table td, .table th { padding: 5px; }
        .regularTable td, .regularTable th { padding: 0; vertical-align: top; border-top: 0px; }
        .lightpurple { background-color: rgb(189, 174, 173); }
        .darkpurple { background-color: rgb(199, 199, 230); }
        .buttonhold { background-color: lightsalmon; }
        .nav-tabs .nav-item.show .nav-link, .nav-tabs .nav-link.active { color: #007bff; }
        body { background-color: black; color: white; }
    </style>
</head>

<body>
    <canvas id="canvas" style="width: 640px;display: none;"></canvas>

    <script src="gl2gpu.js"></script>
	
    <div id="maindiv" class="container text-center">
        <!-- Changed display:none to block so you can see your control layout -->
        <div id="topPanel" style="display: block;">

            <!-- BEFORE LOAD -->
            <div rv-if="data.beforeEmulatorStarted">
                <button id="btnPlayGame" class="btn btn-primary mt-4" onclick="myClass.loadRom();" rv-if="data.hasRoms" rv-disabled="data.moduleInitializing">Play Game</button>
                <button id="btnUploadRom" class="btn btn-primary mt-4" onclick="myApp.uploadBrowse()" rv-disabled="data.moduleInitializing">Choose File</button>
                <button type="button" class="btn btn-primary mt-4" id="btnRemap" onclick="myApp.showRemapModal()">Settings</button>
                <button id="update-files" class="btn btn-primary mt-4">Update</button>
                <span rv-if="data.showLogin">
                    <button class="btn btn-primary mt-4" rv-if="data.loggedIn | ev '==false'" onclick="myApp.loginModal()">Login</button>
                    <button class="btn btn-primary mt-4" rv-if="data.loggedIn | ev '==true'" onclick="myApp.logout()">Logout</button>
                </span>

                <div class="form-check" style="margin-top: 13px;" rv-if="data.settings.SHOWADVANCED">
                    <label class="form-check-label" style="margin-right: 10px;">
                        <input type="checkbox" class="form-check-input" rv-checked="data.chkAdvanced" rv-disabled="data.moduleInitializing"> Advanced
                    </label>
                </div>

                <!-- ROM LIST -->
                <div class="form-group mt-2 mb-4" rv-if="data.hasRoms" style="width: 300px;margin-left: auto; margin-right:auto;">
                    <select class="form-control" id="romselect">
                        <option rv-each-rom="data.romList" rv-value="rom.url">{rom.title}</option>
                    </select>
                </div>
            </div>

            <!-- AFTER LOAD (Fixed your cut-off code elements here) -->
            <div rv-hide="data.beforeEmulatorStarted">
                <div class="btn-group mt-2 mb-2" rv-if="data.settings.SHOWOPTIONS">
                    <button type="button" class="btn btn-primary dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        Options
                    </button>
                </div>
            </div>

            <!-- EMBEDDED NEW EMULATOR WORKSPACE -->
            <div class="mt-4">
                <iframe 
                  src="./n64/index.html" 
                  width="100%" 
                  height="600" 
                  allow="fullscreen; gamepad" 
                  style="border: 2px solid #333; border-radius: 8px; background: #000;">
                </iframe>
            </div>

        </div>
    </div>
</body>
</html>
